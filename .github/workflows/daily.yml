# Daily data pipeline: scrape -> build models -> feed-health -> commit data/.
#
# CRON THROTTLING WARNING (inherited from wc2026, do not forget):
# GitHub Actions `schedule:` triggers are best-effort and HEAVILY throttled on busy
# runners — a job nominally at 06:00 UTC can fire hours late or occasionally be skipped.
# So NOTHING real-time may depend on this cadence. This daily job is for the durable,
# slow-moving record (rosters, weekly stats, season projections). Live in-game scores
# come from the gameday windows (gameday.yml) and, ultimately, an edge endpoint — never
# from this cron's timing.
name: daily-pipeline

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily (best-effort; see throttling note above)
  workflow_dispatch: {}    # allow manual runs from the Actions tab

# Only one pipeline commit in flight at a time; cancel a stale run if a new one starts.
concurrency:
  group: data-pipeline
  cancel-in-progress: false

permissions:
  contents: write          # needed to commit regenerated data/ back to main

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the race-safe pull --ff-only works

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Heavy data libs live ONLY on the pipeline runner, never in the gate. The gate
      # (ci.yml) installs nothing.
      - name: Install pipeline dependencies
        run: pip install --upgrade requests

      # Step 0 — LEARNING LOOP resolve. Grade yesterday's locks BEFORE rebuilding,
      # so the day's build sees a fully resolved record (and any adopted params).
      # STATUS-gated + idempotent; clean no-op when no locked game has gone FINAL.
      - name: Resolve locks against FINAL scores
        run: python -m scripts.resolve_locks

      # Step 1 — deterministic offline outputs from committed fixtures: player
      # projections + parlays. Stdlib only, no network; safe on any runner.
      - name: Build fixture-based players + parlays
        run: python -m scripts.build_all

      # Step 2 — the REAL feed. ESPN 2026 schedule + 2025 FINAL results -> Elo priors
      # -> game predictions, plus schedule_full, real team identity, injuries, and the
      # honest feed-health status. Runs AFTER build_all so real game data overwrites the
      # fixture placeholder. Fails LOUDLY on a broken feed (no continue-on-error). Market
      # feeds (odds/kalshi) stay "degraded" until ODDS_API_KEY is set; nflverse joins
      # when its scraper is wired (proxy-blocked in some sandboxes, fine on GH runners).
      - name: Fetch ESPN + build real predictions + feed health
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}   # optional; market feeds degraded if unset
        run: python -m scripts.build_predictions

      # Validate everything we're about to commit against the JSON contracts.
      - name: Validate data contracts
        run: python scripts/validate_data.py

      # Race-safe commit: other crons (gameday) may push concurrently. Rebase-free:
      # pull --ff-only, then commit + push; on a data conflict prefer freshly generated
      # files (this run just produced them).
      - name: Commit data/
        run: |
          git config user.name  "nfl2026-bot"
          git config user.email "bot@j5lagenticstrategy.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: daily pipeline refresh [skip ci]"
          # race-safe push loop: fast-forward onto whatever landed, retry a few times.
          for i in 1 2 3 4 5; do
            git pull --ff-only origin main && git push origin HEAD:main && exit 0
            echo "push race, retrying ($i)..."
            sleep 5
          done
          echo "::error::could not push data after retries"
          exit 1
