# Weekly walk-forward backtest + promotion gate: the self-learning heartbeat.
#
# Re-runs the full 45-trial parameter grid against ALL resolved real seasons
# (2021-2025 finals + any resolved 2026 locks), refreshes the nflverse EPA
# aggregates, then gives every candidate signal family (environment, rest,
# EPA total/pass) its walk-forward shot — adopting at most one family per week
# and only through the NEVER-REGRESS gate. Most weeks this is a no-op that
# archives its trials into data/model_tuning.json history. CRON THROTTLING
# WARNING applies (see daily.yml): weekly cadence is best-effort, which is fine
# for a job whose output changes slowly.
name: weekly-backtest

on:
  schedule:
    - cron: "0 7 * * 2"   # Tuesdays 07:00 UTC (after Monday night resolves)
  workflow_dispatch: {}

concurrency:
  group: data-pipeline    # never race the daily/gameday commits
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline dependencies
        run: pip install --upgrade requests

      # Resolve any locks first so the backtest sees the freshest graded record.
      - name: Resolve locks against FINAL scores
        run: python -m scripts.resolve_locks

      # EPA aggregates from nflverse pbp. Past seasons are cached in the
      # committed file (never refetched); only the current season streams.
      # The runner has the network access the sandbox proxy blocks.
      - name: Build EPA history (nflverse play-by-play)
        run: python scripts/build_epa_history.py

      - name: Build injury history (nflverse injuries)
        run: python scripts/build_injury_history.py

      - name: Build weather history (Open-Meteo archive)
        run: python scripts/build_weather_history.py

      - name: Build market baseline (measurement only - never an input)
        run: python scripts/build_market_baseline.py

      - name: Build player usage (opportunity metrics)
        run: python scripts/build_player_usage.py

      - name: Build player usage history (skill_out gate raw material)
        run: python scripts/build_player_usage_history.py

      - name: Walk-forward backtest (NEVER-REGRESS gated adoption)
        run: python -m scripts.backtest

      # The self-learning step: every candidate family (environment, rest,
      # EPA total/pass) gets its walk-forward shot; at most ONE family is
      # adopted per week and only past the never-regress margin. Most weeks
      # this archives trials and changes nothing — that is the design.
      - name: Promotion gate (auto-adopt past NEVER-REGRESS margin)
        run: python -m scripts.promote_signals --auto-adopt

      - name: Validate data contracts
        run: python scripts/validate_data.py

      - name: Commit tuning record
        run: |
          git config user.name  "nfl2026-bot"
          git config user.email "bot@j5lagenticstrategy.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No tuning changes to commit."
            exit 0
          fi
          git commit -m "data: weekly backtest refit [skip actions]"
          for i in 1 2 3 4 5; do
            git pull --ff-only origin main && git push origin HEAD:main && exit 0
            echo "push race, retrying ($i)..."
            sleep 5
          done
          echo "::error::could not push backtest data after retries"
          exit 1
