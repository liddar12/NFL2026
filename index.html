<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- Installable iOS PWA first. viewport-fit=cover lets the layout extend under
       the Dynamic Island / home indicator; theme.css re-insets it with the
       safe-area env() vars so nothing is occluded in standalone. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0D1117" />
  <meta name="description" content="NFL2026 — Broadcast Gameday predictions, player projections, and model-EV parlays. Installable PWA." />

  <!-- Standalone PWA hints (iOS + Android). black-translucent lets our dark bg
       run under the status bar; the app title shows on the iOS home screen. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NFL2026" />

  <title>NFL2026</title>

  <!-- PWA manifest + iOS home-screen icon (opaque per iOS requirement). -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
  <!-- Favicon (also silences the browser's /favicon.ico auto-request). -->
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />

  <!-- theme.css owns ALL styling (dark-only Broadcast Gameday design system).
       No inline styles, no CDN, no build step. -->
  <link rel="stylesheet" href="/app/theme.css" />
</head>
<body>
  <!-- App shell. .topbar clears the Dynamic Island, .tabbar clears the home
       indicator (both inset with safe-area env() in theme.css); .view scrolls
       between them. Markup classes are the shared contract the CSS + tests use. -->
  <div class="app">
    <header class="topbar">
      <div class="wordmark">NFL<span class="wm-accent">2026</span></div>
      <div class="wk" id="week-chip">WK 1</div>
    </header>

    <!-- Pipeline health chip (honest degraded/stale reporting), painted by main.js. -->
    <div class="health" id="health" role="status" aria-live="polite"></div>

    <!-- Router paints the active view here; tabindex="-1" so focus can land on
         route change for a11y. -->
    <main class="view" id="view" aria-live="polite" tabindex="-1"></main>

    <!-- Bottom tab bar. Active tab gets .tab--active + aria-selected via main.js. -->
    <nav class="tabbar" role="tablist" aria-label="Sections">
      <a class="tab" href="#/" data-tab="slate" role="tab">Slate</a>
      <a class="tab" href="#/players" data-tab="players" role="tab">Players</a>
      <a class="tab" href="#/parlays" data-tab="parlays" role="tab">Parlays</a>
      <a class="tab" href="#/team" data-tab="team" role="tab">Team</a>
      <a class="tab" href="#/model" data-tab="model" role="tab">Model</a>
    </nav>
  </div>

  <!-- App entry point. ES module (deferred), no bundler. It also registers the
       pure cache-purger service worker best-effort. -->
  <script type="module" src="/app/main.js"></script>
</body>
</html>
